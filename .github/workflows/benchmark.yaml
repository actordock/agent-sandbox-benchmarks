name: benchmark

on:
  workflow_dispatch:
    inputs:
      actordock_ref:
        description: actordock git ref to benchmark
        default: main
        required: true

env:
  ACTORDOCK_REPO: https://github.com/actordock/actordock.git

jobs:
  actordock:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        suite: [runtime-api, sleep-workload]
    steps:
      - name: Checkout benchmarks
        uses: actions/checkout@v4

      - name: Checkout actordock
        uses: actions/checkout@v4
        with:
          repository: actordock/actordock
          ref: ${{ inputs.actordock_ref }}
          path: projects/actordock/.work/actordock

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install actordock
        run: projects/actordock/install.sh
        env:
          ACTORDOCK_REF: ${{ inputs.actordock_ref }}
          ACTORDOCK_ROOT: projects/actordock/.work/actordock

      - name: Deploy benchmark dependencies
        run: |
          if [[ "${{ matrix.suite }}" == "sleep-workload" ]]; then
            projects/actordock/deploy-deps.sh --workloads
          else
            projects/actordock/deploy-deps.sh
          fi

      - name: Generate protos and build Locust image
        run: |
          ACTORDOCK_ROOT="projects/actordock/.work/actordock" projects/actordock/generate_protos.sh
          projects/actordock/build-locust-image.sh

      - name: Run suite
        run: harness/run_suite.sh actordock ${{ matrix.suite }}

      - name: Write job summary
        if: always()
        run: harness/write_step_summary.sh "results/actordock-${{ matrix.suite }}.json"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actordock-${{ matrix.suite }}-${{ inputs.actordock_ref }}
          path: results/actordock-${{ matrix.suite }}.json
          if-no-files-found: warn
